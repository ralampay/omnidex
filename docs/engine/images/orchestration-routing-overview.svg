<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" fill="none">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#1f2937"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
  </defs>
  <rect width="980" height="540" rx="24" fill="url(#bg)"/>
  <text x="44" y="56" fill="#0f172a" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Orchestrator Routing With Session Artifact State</text>
  <rect x="44" y="100" width="220" height="120" rx="18" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="68" y="142" fill="#0f172a" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">User Turn</text>
  <text x="68" y="176" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="18">Current request</text>
  <text x="68" y="202" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="18">for work or follow-up</text>

  <rect x="320" y="70" width="300" height="180" rx="18" fill="#ffffff" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="346" y="112" fill="#1e3a8a" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Orchestrator Router</text>
  <text x="346" y="148" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Inputs:</text>
  <text x="366" y="176" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• current user input</text>
  <text x="366" y="202" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• bounded memory context</text>
  <text x="366" y="228" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• last_response / last_responder / tools</text>

  <rect x="320" y="306" width="300" height="156" rx="18" fill="#ffffff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="346" y="348" fill="#5b21b6" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Session Artifact State</text>
  <text x="346" y="384" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Ephemeral continuity only:</text>
  <text x="366" y="412" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• last_response</text>
  <text x="366" y="436" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• last_responder</text>
  <text x="366" y="460" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• last_tools_used</text>

  <rect x="688" y="88" width="240" height="100" rx="18" fill="#ffffff" stroke="#0f766e" stroke-width="2.5"/>
  <text x="712" y="128" fill="#134e4a" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Chat</text>
  <text x="712" y="160" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Direct orchestrator answer</text>

  <rect x="688" y="236" width="240" height="136" rx="18" fill="#ffffff" stroke="#b45309" stroke-width="2.5"/>
  <text x="712" y="276" fill="#92400e" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Research Assistant</text>
  <text x="712" y="308" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Planning + tool execution</text>
  <text x="712" y="334" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Keeps follow-up export/save</text>
  <text x="712" y="358" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">requests with prior artifact</text>

  <line x1="264" y1="160" x2="320" y2="160" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="470" y1="250" x2="470" y2="306" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="620" y1="145" x2="688" y2="138" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="620" y1="188" x2="688" y2="282" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="535" y="286" fill="#475569" font-family="Helvetica, Arial, sans-serif" font-size="15">prior artifact context</text>
  <text x="98" y="264" fill="#475569" font-family="Helvetica, Arial, sans-serif" font-size="18">Example follow-up: "save it to ~/Desktop/output.md"</text>
  <text x="44" y="506" fill="#475569" font-family="Helvetica, Arial, sans-serif" font-size="16">Key idea: routing is model-driven, but it is grounded by ephemeral session artifact state.</text>
</svg>

