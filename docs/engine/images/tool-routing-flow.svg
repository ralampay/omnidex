<svg xmlns="http://www.w3.org/2000/svg" width="980" height="600" viewBox="0 0 980 600" fill="none">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#1f2937"/>
    </marker>
    <linearGradient id="bg-routing" x1="0" y1="0" x2="980" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
  </defs>
  <rect width="980" height="600" rx="24" fill="url(#bg-routing)"/>
  <text x="42" y="56" fill="#0f172a" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Research Assistant Tool Routing</text>

  <rect x="44" y="108" width="232" height="118" rx="18" fill="#ffffff" stroke="#334155" stroke-width="2.5"/>
  <text x="68" y="148" fill="#0f172a" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Incoming Query</text>
  <text x="68" y="182" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Current user request</text>
  <text x="68" y="208" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">plus session artifact state</text>

  <rect x="332" y="80" width="320" height="174" rx="18" fill="#ffffff" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="356" y="122" fill="#1e3a8a" font-family="Helvetica, Arial, sans-serif" font-size="23" font-weight="700">Direct-Flow Classifier</text>
  <text x="356" y="158" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Check obvious cases first:</text>
  <text x="376" y="186" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• PDF summary request</text>
  <text x="376" y="210" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• PDF insights request</text>
  <text x="376" y="234" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• follow-up save/export request</text>

  <rect x="730" y="70" width="206" height="150" rx="18" fill="#ffffff" stroke="#0f766e" stroke-width="2.5"/>
  <text x="754" y="112" fill="#134e4a" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Direct Path</text>
  <text x="754" y="146" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Deterministic pipeline</text>
  <text x="754" y="172" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">No planner latency</text>
  <text x="754" y="198" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Use stored artifact when saving</text>

  <rect x="730" y="274" width="206" height="150" rx="18" fill="#ffffff" stroke="#be123c" stroke-width="2.5"/>
  <text x="754" y="316" fill="#9f1239" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Planner Path</text>
  <text x="754" y="350" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Open-ended or ambiguous</text>
  <text x="754" y="376" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Model returns step plan</text>
  <text x="754" y="402" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Executor runs tool loop</text>

  <rect x="54" y="332" width="270" height="188" rx="18" fill="#ffffff" stroke="#b45309" stroke-width="2.5"/>
  <text x="80" y="374" fill="#92400e" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Example Direct Pipelines</text>
  <text x="80" y="410" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">PDF summary:</text>
  <text x="100" y="436" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">pdf_present → pdf_reader</text>
  <text x="100" y="460" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">→ summarize_text → create_output</text>
  <text x="80" y="494" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Follow-up save:</text>
  <text x="100" y="520" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">read artifact → extract_output_request</text>
  <text x="100" y="544" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">→ create_output</text>

  <rect x="362" y="330" width="310" height="192" rx="18" fill="#ffffff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="386" y="372" fill="#5b21b6" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Planned Execution Loop</text>
  <text x="386" y="408" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">1. describe tools</text>
  <text x="386" y="434" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">2. build plan from query + state</text>
  <text x="386" y="460" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">3. resolve $state references</text>
  <text x="386" y="486" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">4. execute tools and write outputs</text>
  <text x="386" y="512" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">5. return final artifact / response</text>

  <line x1="276" y1="167" x2="332" y2="167" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="652" y1="150" x2="730" y2="146" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="652" y1="216" x2="730" y2="348" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="730" y1="146" x2="672" y2="146" stroke="#1f2937" stroke-width="0"/>
  <line x1="324" y1="426" x2="362" y2="426" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="678" y="136" fill="#475569" font-family="Helvetica, Arial, sans-serif" font-size="15">obvious intent</text>
  <text x="674" y="294" fill="#475569" font-family="Helvetica, Arial, sans-serif" font-size="15">not obvious</text>
  <text x="44" y="572" fill="#475569" font-family="Helvetica, Arial, sans-serif" font-size="16">Key idea: use deterministic code for high-confidence workflows, and keep planner-based execution for flexible cases.</text>
</svg>
