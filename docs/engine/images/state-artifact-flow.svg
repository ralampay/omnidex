<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" fill="none">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#1f2937"/>
    </marker>
    <linearGradient id="bg-artifact" x1="0" y1="0" x2="980" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
  </defs>
  <rect width="980" height="560" rx="24" fill="url(#bg-artifact)"/>
  <text x="42" y="56" fill="#0f172a" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Session Artifact State And Follow-up Save Flow</text>

  <rect x="42" y="102" width="236" height="122" rx="18" fill="#ffffff" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="66" y="144" fill="#1e3a8a" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Artifact-Producing Turn</text>
  <text x="66" y="178" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">PDF insights or summary</text>
  <text x="66" y="204" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">finishes with create_output</text>

  <rect x="330" y="78" width="322" height="170" rx="18" fill="#ffffff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="354" y="120" fill="#5b21b6" font-family="Helvetica, Arial, sans-serif" font-size="23" font-weight="700">create_output Result</text>
  <text x="354" y="156" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Structured output fields:</text>
  <text x="374" y="184" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• content</text>
  <text x="374" y="208" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• artifact_content</text>
  <text x="374" y="232" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• saved_path (optional)</text>

  <rect x="708" y="78" width="228" height="170" rx="18" fill="#ffffff" stroke="#0f766e" stroke-width="2.5"/>
  <text x="732" y="120" fill="#134e4a" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Agent Session State</text>
  <text x="732" y="156" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Stores:</text>
  <text x="752" y="184" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• last_response</text>
  <text x="752" y="208" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• last_artifact_content</text>
  <text x="752" y="232" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• responder + tools</text>

  <rect x="90" y="330" width="300" height="158" rx="18" fill="#ffffff" stroke="#b45309" stroke-width="2.5"/>
  <text x="116" y="372" fill="#92400e" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Next User Turn</text>
  <text x="116" y="406" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Example:</text>
  <text x="116" y="434" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">"Save this to ~/Desktop/out.md"</text>
  <text x="116" y="462" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">No regeneration needed</text>

  <rect x="458" y="318" width="252" height="182" rx="18" fill="#ffffff" stroke="#be123c" stroke-width="2.5"/>
  <text x="482" y="360" fill="#9f1239" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Direct Save Path</text>
  <text x="482" y="394" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">1. read last_artifact_content</text>
  <text x="482" y="420" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">2. parse filename</text>
  <text x="482" y="446" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">3. call create_output</text>
  <text x="482" y="472" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">4. write exact artifact body</text>

  <rect x="766" y="348" width="170" height="122" rx="18" fill="#ffffff" stroke="#334155" stroke-width="2.5"/>
  <text x="790" y="390" fill="#0f172a" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Disk File</text>
  <text x="790" y="424" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Exact saved copy</text>

  <line x1="278" y1="163" x2="330" y2="163" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="652" y1="163" x2="708" y2="163" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M822 248C822 284 822 292 822 318" stroke="#1f2937" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <line x1="390" y1="409" x2="458" y2="409" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="710" y1="409" x2="766" y2="409" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="44" y="528" fill="#475569" font-family="Helvetica, Arial, sans-serif" font-size="16">Key idea: save follow-ups should reuse stored artifact_content, not regenerate or scrape the previous chat response.</text>
</svg>
