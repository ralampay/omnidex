<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" fill="none">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#1f2937"/>
    </marker>
    <linearGradient id="bg2" x1="0" y1="0" x2="980" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
  </defs>
  <rect width="980" height="560" rx="24" fill="url(#bg2)"/>
  <text x="42" y="58" fill="#0f172a" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Plan-And-Execute Blackboard Loop</text>

  <rect x="44" y="108" width="220" height="116" rx="18" fill="#ffffff" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="68" y="148" fill="#1e3a8a" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Planner</text>
  <text x="68" y="182" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Builds step list from:</text>
  <text x="88" y="208" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">tools + initial state</text>

  <rect x="330" y="82" width="300" height="168" rx="18" fill="#ffffff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="354" y="122" fill="#5b21b6" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Execution State / Blackboard</text>
  <text x="354" y="156" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Top-level values:</text>
  <text x="374" y="182" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• $query</text>
  <text x="374" y="206" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• $context</text>
  <text x="374" y="230" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">• $last_response / $last_responder</text>

  <rect x="706" y="108" width="226" height="116" rx="18" fill="#ffffff" stroke="#0f766e" stroke-width="2.5"/>
  <text x="730" y="148" fill="#134e4a" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Tool Step</text>
  <text x="730" y="182" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Resolve inputs</text>
  <text x="730" y="208" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="17">Run tool</text>

  <rect x="134" y="332" width="712" height="168" rx="20" fill="#ffffff" stroke="#334155" stroke-width="2.5"/>
  <text x="160" y="372" fill="#0f172a" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Example Step Chain</text>
  <text x="160" y="410" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="18">1. pdf_present(query="$query")            → output_key="pdf_ref"</text>
  <text x="160" y="438" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="18">2. pdf_reader(file_path="$state.pdf_ref.file_path") → output_key="pdf_doc"</text>
  <text x="160" y="466" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="18">3. extract_report_insights(text="$state.pdf_doc.text") → output_key="insights"</text>
  <text x="160" y="494" fill="#334155" font-family="Helvetica, Arial, sans-serif" font-size="18">4. report_insights(... from $state.insights ...)      → output_key="report"</text>

  <line x1="264" y1="166" x2="330" y2="166" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="630" y1="166" x2="706" y2="166" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M819 224C819 276 738 268 634 268C530 268 480 284 480 332" stroke="#1f2937" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M480 332C480 284 430 268 326 268C222 268 154 276 154 224" stroke="#1f2937" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <text x="688" y="286" fill="#475569" font-family="Helvetica, Arial, sans-serif" font-size="15">write result to state[output_key]</text>
  <text x="44" y="534" fill="#475569" font-family="Helvetica, Arial, sans-serif" font-size="16">The agent stays generic because tools communicate through structured state, not through agent-specific branches.</text>
</svg>

